AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Log Fingerprinting Pipeline — CI/CD CodePipeline
  Source (GitHub/CodeCommit) → Test → Package → Deploy Dev
  → Manual Approval → Deploy Prod (canary via CodeDeploy)

# ══════════════════════════════════════════════════════════════════════════════
# PARAMETERS
# ══════════════════════════════════════════════════════════════════════════════
Parameters:

  GitHubOwner:
    Type: String
    Description: GitHub repository owner (org or username).

  GitHubRepo:
    Type: String
    Default: log-fingerprinting

  GitHubBranch:
    Type: String
    Default: main

  GitHubConnectionArn:
    Type: String
    Description: >
      AWS CodeStar Connections ARN for the GitHub connection.
      Create via: AWS Console → Developer Tools → Connections.

  ArtifactBucketName:
    Type: String
    Description: S3 bucket for CodePipeline artifacts (must exist, versioning enabled).

  DevStackName:
    Type: String
    Default: log-fingerprinting-dev

  ProdStackName:
    Type: String
    Default: log-fingerprinting-prod

  DevReleaseID:
    Type: String
    Default: "dev-latest"

  ApprovalEmail:
    Type: String
    Description: E-mail address for prod deployment manual approval.

# ══════════════════════════════════════════════════════════════════════════════
# RESOURCES
# ══════════════════════════════════════════════════════════════════════════════
Resources:

  # ────────────────────────────────────────────────────────────────────────────
  # IAM — CodeBuild role
  # ────────────────────────────────────────────────────────────────────────────
  CodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: log-fp-codebuild-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: codebuild.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodeBuildPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/*"
              - Effect: Allow
                Action: [s3:GetObject, s3:PutObject, s3:GetObjectVersion]
                Resource: !Sub "arn:aws:s3:::${ArtifactBucketName}/*"
              - Effect: Allow
                Action: cloudformation:ValidateTemplate
                Resource: "*"

  # ────────────────────────────────────────────────────────────────────────────
  # IAM — CodePipeline role
  # ────────────────────────────────────────────────────────────────────────────
  PipelineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: log-fp-pipeline-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: codepipeline.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: PipelinePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [s3:GetObject, s3:PutObject, s3:GetBucketVersioning]
                Resource:
                  - !Sub "arn:aws:s3:::${ArtifactBucketName}"
                  - !Sub "arn:aws:s3:::${ArtifactBucketName}/*"
              - Effect: Allow
                Action: codestar-connections:UseConnection
                Resource: !Ref GitHubConnectionArn
              - Effect: Allow
                Action:
                  - codebuild:StartBuild
                  - codebuild:BatchGetBuilds
                Resource: "*"
              - Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                  - cloudformation:GetTemplate
                  - cloudformation:ValidateTemplate
                Resource: "*"
              - Effect: Allow
                Action: iam:PassRole
                Resource: !GetAtt CloudFormationDeployRole.Arn
              - Effect: Allow
                Action: sns:Publish
                Resource: !Ref ApprovalTopic
              - Effect: Allow
                Action: codedeploy:*
                Resource: "*"

  # ────────────────────────────────────────────────────────────────────────────
  # IAM — CloudFormation deployment role
  # ────────────────────────────────────────────────────────────────────────────
  CloudFormationDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: log-fp-cfn-deploy-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: cloudformation.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        # Scope this down for production — here it's broad for initial setup.
        - arn:aws:iam::aws:policy/PowerUserAccess
      Policies:
        - PolicyName: IAMPassRole
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [iam:CreateRole, iam:DeleteRole, iam:PutRolePolicy,
                         iam:AttachRolePolicy, iam:DetachRolePolicy,
                         iam:GetRole, iam:PassRole, iam:DeleteRolePolicy]
                Resource: "*"

  # ────────────────────────────────────────────────────────────────────────────
  # CodeBuild — Test stage
  # ────────────────────────────────────────────────────────────────────────────
  TestProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: log-fp-test
      ServiceRole: !GetAtt CodeBuildRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: ARM_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/amazonlinux2-aarch64-standard:3.0
      Source:
        Type: CODEPIPELINE
        BuildSpec: |
          version: 0.2
          phases:
            install:
              runtime-versions:
                python: 3.12
              commands:
                - pip install -r requirements-dev.txt --quiet
            pre_build:
              commands:
                - echo "Running sanitizer unit tests..."
                - python -m pytest tests/test_sanitizer.py -v --tb=short
            build:
              commands:
                - echo "Running regression suite against 50 golden samples..."
                - python -m pytest tests/test_regression.py -v --tb=short
                - echo "Running full compression analysis..."
                - python scripts/analyze_compression.py --logs logs.json
          reports:
            pytest_reports:
              files:
                - "**/*.xml"
              base-directory: test-results
              file-format: JUNITXML
      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED
          GroupName: /aws/codebuild/log-fp-test

  # ────────────────────────────────────────────────────────────────────────────
  # CodeBuild — Package stage (zip + S3 upload)
  # ────────────────────────────────────────────────────────────────────────────
  PackageProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: log-fp-package
      ServiceRole: !GetAtt CodeBuildRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: ARM_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/amazonlinux2-aarch64-standard:3.0
        EnvironmentVariables:
          - Name: ARTIFACT_BUCKET
            Value: !Ref ArtifactBucketName
      Source:
        Type: CODEPIPELINE
        BuildSpec: |
          version: 0.2
          phases:
            install:
              runtime-versions:
                python: 3.12
            build:
              commands:
                - echo "Packaging Ingestor..."
                - mkdir -p dist/ingestor
                - cp src/handlers/ingestor.py dist/ingestor/
                - cp -r src/analyzer dist/ingestor/
                - cd dist/ingestor && zip -r ../../ingestor.zip . && cd ../..

                - echo "Packaging Fingerprinter..."
                - mkdir -p dist/fingerprinter
                - cp src/handlers/fingerprinter.py dist/fingerprinter/
                - cp -r src/analyzer dist/fingerprinter/
                - cd dist/fingerprinter && zip -r ../../fingerprinter.zip . && cd ../..

                - COMMIT_SHA=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c1-8)
                - echo "Uploading packages to S3 (sha=${COMMIT_SHA})..."
                - aws s3 cp ingestor.zip      s3://$ARTIFACT_BUCKET/releases/$COMMIT_SHA/ingestor.zip
                - aws s3 cp fingerprinter.zip s3://$ARTIFACT_BUCKET/releases/$COMMIT_SHA/fingerprinter.zip

                - echo "COMMIT_SHA=$COMMIT_SHA" > build.env
                - echo "INGESTOR_KEY=releases/$COMMIT_SHA/ingestor.zip" >> build.env
                - echo "FINGERPRINTER_KEY=releases/$COMMIT_SHA/fingerprinter.zip" >> build.env
          artifacts:
            files: [build.env, cloudformation/infra.yaml]
      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED
          GroupName: /aws/codebuild/log-fp-package

  # ────────────────────────────────────────────────────────────────────────────
  # SNS — Manual approval notification
  # ────────────────────────────────────────────────────────────────────────────
  ApprovalTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: log-fp-prod-approval
      DisplayName: "Log Fingerprinting — Prod Deployment Approval"
      Subscriptions:
        - Protocol: email
          Endpoint: !Ref ApprovalEmail

  # ────────────────────────────────────────────────────────────────────────────
  # CodePipeline
  # ────────────────────────────────────────────────────────────────────────────
  Pipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: log-fingerprinting-pipeline
      RoleArn: !GetAtt PipelineRole.Arn
      ArtifactStore:
        Type: S3
        Location: !Ref ArtifactBucketName
      Stages:

        # ── Stage 1: Source ─────────────────────────────────────────────────
        - Name: Source
          Actions:
            - Name: GitHub
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeStarSourceConnection
                Version: "1"
              Configuration:
                ConnectionArn: !Ref GitHubConnectionArn
                FullRepositoryId: !Sub "${GitHubOwner}/${GitHubRepo}"
                BranchName: !Ref GitHubBranch
                OutputArtifactFormat: CODEBUILD_CLONE_REF
              OutputArtifacts: [{ Name: SourceCode }]
              RunOrder: 1

        # ── Stage 2: Test ────────────────────────────────────────────────────
        - Name: Test
          Actions:
            - Name: UnitAndRegressionTests
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: "1"
              Configuration:
                ProjectName: !Ref TestProject
              InputArtifacts: [{ Name: SourceCode }]
              OutputArtifacts: [{ Name: TestResults }]
              RunOrder: 1

        # ── Stage 3: Package ─────────────────────────────────────────────────
        - Name: Package
          Actions:
            - Name: ZipAndUpload
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: "1"
              Configuration:
                ProjectName: !Ref PackageProject
              InputArtifacts: [{ Name: SourceCode }]
              OutputArtifacts: [{ Name: BuildOutput }]
              RunOrder: 1

        # ── Stage 4: Deploy Dev ──────────────────────────────────────────────
        - Name: Deploy-Dev
          Actions:
            - Name: CloudFormationDeploy
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: CloudFormation
                Version: "1"
              Configuration:
                ActionMode: CREATE_UPDATE
                StackName: !Ref DevStackName
                TemplatePath: "BuildOutput::cloudformation/infra.yaml"
                RoleArn: !GetAtt CloudFormationDeployRole.Arn
                ParameterOverrides: !Sub |
                  {
                    "Environment": "dev",
                    "ReleaseID": "#{buildVariables.COMMIT_SHA}",
                    "CodeBucketName": "${ArtifactBucketName}",
                    "IngestorS3Key": "#{buildVariables.INGESTOR_KEY}",
                    "FingerprinterS3Key": "#{buildVariables.FINGERPRINTER_KEY}"
                  }
                Capabilities: CAPABILITY_NAMED_IAM
              InputArtifacts: [{ Name: BuildOutput }]
              Namespace: buildVariables
              RunOrder: 1

        # ── Stage 5: Manual Approval ─────────────────────────────────────────
        - Name: Approve-Prod
          Actions:
            - Name: ManualApproval
              ActionTypeId:
                Category: Approval
                Owner: AWS
                Provider: Manual
                Version: "1"
              Configuration:
                NotificationArn: !Ref ApprovalTopic
                CustomData: >
                  Dev deployment succeeded. Review CloudWatch dashboards and DLQ
                  depth before approving production deployment.
                ExternalEntityLink: !Sub
                  - "https://${AWS::Region}.console.aws.amazon.com/lambda/home?region=${AWS::Region}#/functions/log-fp-fingerprinter-dev"
                  - {}
              RunOrder: 1

        # ── Stage 6: Deploy Prod (canary via CodeDeploy) ─────────────────────
        - Name: Deploy-Prod
          Actions:
            - Name: CloudFormationDeploy
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: CloudFormation
                Version: "1"
              Configuration:
                ActionMode: CREATE_UPDATE
                StackName: !Ref ProdStackName
                TemplatePath: "BuildOutput::cloudformation/infra.yaml"
                RoleArn: !GetAtt CloudFormationDeployRole.Arn
                ParameterOverrides: !Sub |
                  {
                    "Environment": "prod",
                    "ReleaseID": "#{buildVariables.COMMIT_SHA}",
                    "CodeBucketName": "${ArtifactBucketName}",
                    "IngestorS3Key": "#{buildVariables.INGESTOR_KEY}",
                    "FingerprinterS3Key": "#{buildVariables.FINGERPRINTER_KEY}"
                  }
                Capabilities: CAPABILITY_NAMED_IAM
              InputArtifacts: [{ Name: BuildOutput }]
              RunOrder: 1

# ══════════════════════════════════════════════════════════════════════════════
# OUTPUTS
# ══════════════════════════════════════════════════════════════════════════════
Outputs:
  PipelineUrl:
    Description: CodePipeline console URL.
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/codesuite/codepipeline/pipelines/log-fingerprinting-pipeline/view"

  ApprovalTopicArn:
    Description: SNS topic for prod deployment approval notifications.
    Value: !Ref ApprovalTopic
